<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Web Game</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    </head>
<body>

    <main id="gameWrapper">
        <section id="menuContainer" class="screen">
            <input type="text" id="playerName" placeholder="أدخل اسمك هنا...">
            <input type="text" id="roomCode" placeholder="كود الغرفة (4 خانات)">
            <button id="btnCreate">إنشاء غرفة</button>
            <button id="btnJoinCode">انضمام بالكود</button>
            <button id="btnJoinRandom">دخول عشوائي</button>
            <div id="errorMessage" class="hidden"></div>
        </section>

        <section id="lobbyScreen" class="screen hidden">
            <h2 id="displayRoomCode"></h2>
            <ul id="playersList"></ul>
            <div id="hostSettingsPanel">
                </div>
            <button id="btnStartGame" class="hidden">بدء اللعبة</button>
        </section>

        <section id="gameScreen" class="screen hidden">
            <canvas id="gameCanvas"></canvas>
            <button id="btnKill" class="action-btn">تصفية</button>
            <button id="btnReport" class="action-btn">تبليغ</button>
            <span id="killCooldownTimer"></span>
        </section>
    </main>

    <script type="module" src="./src/index.ts"></script>
</body>
</html>
